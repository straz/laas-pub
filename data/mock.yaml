  # ─── Q1 2025 ───────────────────────────────────────────────────────────────

  - id: CR-Q1Y25-001
    quarter: Q1 2025
    period: 2025-Q1
    created_date: "2025-01-06"
    owner: Patricia Okafor, CFO
    title: Seasonal Transaction Volume
    commitment: >-
      UnReal Brokerage will close no fewer than 33,500 residential transactions
      in Q1 2025, consistent with the seasonal deceleration pattern from Q4 and
      representing the foundation for the peak spring selling season pipeline.
    foreclosed_alternative: >-
      UnReal Brokerage will close 38,000 or more transactions in Q1 2025,
      demonstrating that the platform's agent productivity improvements have
      materially reduced the seasonal trough.
    falsifier: >-
      January closed transaction count falls below 7,500, indicating a pipeline
      shortfall that cannot be recovered within the quarter even with a strong
      February and March close.
    stake: >-
      VP of Brokerage Operations placed on formal performance review and
      regional team performance plans revised before the start of Q2.
    prior_period_adjudication:
      quarter: Q4 2024
      status: validated
      finding: >-
        Q4 2024 closed with 43,200 transactions, above the 41,000 commitment.
        Full-year 2024 revenue reached $1.49B. Agent count exited the year at
        30,100, sustaining the growth trajectory entering the 2025 spring season.
    resolution:
      status: validated
      finding: >-
        UnReal closed 35,200 transactions in Q1 2025. January delivered 8,100
        closings, above the 7,500 falsifier threshold. Spring pipeline entering
        Q2 was 18% above the same point in 2024.
      date: "2025-04-15"

  - id: CR-Q1Y25-002
    quarter: Q1 2025
    period: 2025-Q1
    created_date: "2025-01-06"
    owner: Patricia Okafor, CFO
    title: Agent Platform Retention
    commitment: >-
      Total active agents on the UnReal platform will be at or above 30,500
      at March 31, 2025, reflecting net growth from Q4 2024's year-end count
      of 30,100 despite seasonal recruiting softness.
    foreclosed_alternative: >-
      Total active agents will reach 31,500 or above at March 31, 2025,
      demonstrating that the platform's value proposition is driving year-round
      agent additions independent of the spring selling season.
    falsifier: >-
      Monthly revenue churn — the percentage of the prior month's revenue
      attributable to agents who departed — exceeds 2.2% in any single month
      of Q1 2025.
    stake: >-
      Agent experience program overhauled and all recruiting incentives suspended
      pending a full audit of the churn cohort and a board presentation on
      platform retention strategy.
    prior_period_adjudication:
      quarter: Q4 2024
      status: validated
      finding: >-
        UnReal ended Q4 2024 with 30,100 active agents, above the 29,800
        commitment. Revenue churn peaked at 1.7% in November and finished Q4
        at 1.6%, confirming that the agent retention initiatives launched in
        Q3 2024 were effective.
    resolution:
      status: validated
      finding: >-
        Active agent count reached 30,840 at March 31, 2025. Revenue churn
        peaked at 1.9% in February — elevated but below the 2.2% falsifier —
        driven by post-NAR-settlement attrition in legacy buyer-agent cohorts.
      date: "2025-04-15"

  - id: CR-Q1Y25-003
    quarter: Q1 2025
    period: 2025-Q1
    created_date: "2025-01-06"
    owner: Patricia Okafor, CFO
    title: Gross Profit Target
    commitment: >-
      Q1 2025 gross profit will reach $28.5M or above, reflecting a gross
      margin of at least 8.5% on projected Q1 revenue, consistent with the
      annual plan and the company's long-term margin architecture.
    foreclosed_alternative: >-
      Q1 2025 gross profit will reach $33M or above, reflecting a gross margin
      of 9.0%+ and demonstrating that the capped-agent mix shift is progressing
      faster than modeled.
    falsifier: >-
      Revenue share expense — the portion of gross commission income paid
      back to agent-sponsors under the revenue share program — exceeds 5.2%
      of gross revenue in any single month of Q1 2025.
    stake: >-
      Commission structure and revenue share model reviewed with the board of
      directors before the start of agent recruiting season, with authority
      granted to revise tier thresholds before April 1.
    prior_period_adjudication: null
    resolution:
      status: validated
      finding: >-
        Gross profit was $29.8M in Q1 2025, yielding an 8.7% gross margin
        on $342M of revenue. Revenue share expense held at 4.9% of gross
        revenue throughout the quarter.
      date: "2025-04-15"

  - id: CR-Q1Y25-004
    quarter: Q1 2025
    period: 2025-Q1
    created_date: "2025-01-06"
    owner: Patricia Okafor, CFO
    title: Ancillary Revenue Growth
    commitment: >-
      Combined revenue from UnReal Mortgage and UnReal Title will reach $3.2M
      or above in Q1 2025, representing at least 40% year-over-year growth
      and affirming the attach-rate improvement trajectory established in 2024.
    foreclosed_alternative: >-
      Combined ancillary revenue from UnReal Mortgage and UnReal Title will
      reach $4.0M or above in Q1 2025, demonstrating early traction toward
      the long-term target of 10%+ of total revenue from ancillary services.
    falsifier: >-
      UnReal Mortgage attach rate — the percentage of closed transactions
      where UnReal Mortgage originated the buyer's loan — falls below 2.8%
      for any two consecutive months of Q1 2025.
    stake: >-
      UnReal Mortgage and UnReal Title division heads placed on 90-day
      performance review; a third-party strategic partnership for mortgage
      origination evaluated as an alternative operating model.
    prior_period_adjudication:
      quarter: Q4 2024
      status: validated
      finding: >-
        Q4 2024 combined ancillary revenue was $3.1M, above the $2.8M
        commitment. Mortgage attach rate held at 3.2% in Q4. UnReal Title
        expanded to six joint ventures in eight states entering 2025.
    resolution:
      status: falsified
      finding: >-
        Combined ancillary revenue was $2.9M in Q1 2025, below the $3.2M
        commitment. Mortgage attach rate fell to 2.4% in February — triggering
        the falsifier for two consecutive months — driven by borrower rate
        sensitivity following the January Fed commentary on delayed rate cuts.
      date: "2025-04-15"

  - id: CR-Q1Y25-005
    quarter: Q1 2025
    period: 2025-Q1
    created_date: "2025-01-06"
    owner: Patricia Okafor, CFO
    title: Adjusted Operating Expense Ratio
    commitment: >-
      Adjusted operating expense as a percentage of Q1 2025 revenue will be
      at or below 7.5%, reflecting continued operating leverage as agent count
      and transaction volume scale.
    foreclosed_alternative: >-
      Adjusted operating expense will be at or below 6.5% of revenue,
      demonstrating that the efficiency gains from platform automation are
      ahead of the operating plan.
    falsifier: >-
      Any unplanned legal settlement or litigation accrual exceeds $1.5M
      in Q1 2025, materially distorting the OpEx ratio and signaling an
      unmanaged legal liability.
    stake: >-
      Legal strategy reviewed by the board and all pending litigation matters
      brought to the audit committee for individual settlement approval before
      June 30, 2025.
    prior_period_adjudication:
      quarter: Q4 2024
      status: validated
      finding: >-
        Q4 2024 adjusted OpEx ratio was 7.8%, within the committed threshold.
        No material legal settlements were recorded. The Leo AI agent support
        tool reduced human support headcount by 14% on a full-year basis.
    resolution:
      status: validated
      finding: >-
        Adjusted OpEx was 6.9% of revenue in Q1 2025. No litigation settlements
        were recorded. Leo AI handled 62% of inbound agent support contacts
        without escalation, a record for the platform.
      date: "2025-04-15"

  # ─── Q2 2025 ───────────────────────────────────────────────────────────────

  - id: CR-Q2Y25-001
    quarter: Q2 2025
    period: 2025-Q2
    created_date: "2025-04-01"
    owner: Patricia Okafor, CFO
    title: Peak Season Transaction Volume
