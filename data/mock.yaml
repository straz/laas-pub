      date: "2025-07-16"

  # ─── Q3 2025 ───────────────────────────────────────────────────────────────

  - id: CR-Q3Y25-001
    quarter: Q3 2025
    period: 2025-Q3
    created_date: "2025-07-01"
    owner: Patricia Okafor, CFO
    title: Post-Peak Transaction Volume
    commitment: >-
      UnReal Brokerage will close 45,000 or more residential transactions
      in Q3 2025, sustaining above-market pace as seasonal activity moderates
      from the Q2 peak and the summer market softens.
    foreclosed_alternative: >-
      UnReal Brokerage will close 50,000 or more transactions in Q3 2025,
      demonstrating that platform agent productivity improvements are reducing
      the seasonal deceleration relative to the broader residential market.
    falsifier: >-
      September closed transaction count falls more than 18% below August,
      indicating that the fall pipeline has stalled and Q4 setup is materially
      weaker than the operating plan assumed.
    stake: >-
      Regional team performance plans revised and Brokerage Operations team
      restructured before October earnings; head of transaction operations placed
      on a 60-day performance plan.
    prior_period_adjudication:
      quarter: Q2 2025
      status: validated
      finding: >-
        Q2 2025 closed with 52,400 transactions at a record $10,320 average
        revenue per transaction. Revenue was $541M. Company achieved its
        first quarter of positive operating income.
    resolution:
      status: falsified
      finding: >-
        UnReal closed 42,100 transactions in Q3 2025, below the 45,000
        commitment. September fell 21% below August — triggering the falsifier —
        as rate lock activity collapsed following the August FOMC meeting and
        a wave of buyer contract cancellations across Sun Belt markets.
      date: "2025-10-17"

  - id: CR-Q3Y25-002
    quarter: Q3 2025
    period: 2025-Q3
    created_date: "2025-07-01"
    owner: Patricia Okafor, CFO
    title: Year-End Agent Count Trajectory
    commitment: >-
      Total active agents on the UnReal platform will reach 33,000 or above
