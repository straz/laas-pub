      UnReal Brokerage will close 50,000 or more residential transactions in
      Q2 2025, capitalizing on the spring selling season and the 18%-above-prior-year
      pipeline entering April.
    foreclosed_alternative: >-
      UnReal Brokerage will close 56,000 or more transactions in Q2 2025,
      indicating that agent productivity improvements are materially compressing
      the seasonal gap relative to the broader market.
    falsifier: >-
      April closed transaction count falls more than 15% below March's closing
      pace, indicating a pipeline air pocket that cannot be recovered within
      the quarter.
    stake: >-
      Enterprise team recruiting program suspended for the remainder of 2025
      and transaction volume gap presented to the full board as a strategic risk.
    prior_period_adjudication:
      quarter: Q1 2025
      status: validated
      finding: >-
        Q1 2025 closed with 35,200 transactions and 30,840 active agents.
        January delivered 8,100 closings. Spring pipeline entering Q2 was
        18% above the same point in 2024.
    resolution:
      status: validated
      finding: >-
        UnReal closed 52,400 transactions in Q2 2025. April pace held within
        4% of March. Revenue per transaction of $10,320 was a company record.
        Spring season delivered the strongest quarter in company history.
      date: "2025-07-16"

  - id: CR-Q2Y25-002
    quarter: Q2 2025
    period: 2025-Q2
    created_date: "2025-04-01"
    owner: Patricia Okafor, CFO
